version: 2

sources:
  - name: public
    database: market_data
    schema: public
    tables:
      - name: daily_ohlcv
        description: "Raw daily OHLCV data from Massive.com API"
        loaded_at_field: time
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
      - name: symbols
        description: "S&P 500 stock symbols with sector information"
